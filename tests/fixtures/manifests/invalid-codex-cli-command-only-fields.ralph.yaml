schemaVersion: "0.1"
project:
  name: invalid-codex-cli-command-only-fields
  artifact: code
proposer:
  type: codex_cli
  command: codex exec
  cwd: ./tmp
  env:
    CODEX_ENV: "1"
  timeoutSec: 60
  ttySession: {}
experiment:
  run:
    command: ./scripts/run.sh
metrics:
  catalog:
    - id: quality
      kind: numeric
      direction: maximize
      extractor:
        type: command
        command: ./scripts/metric.sh
        parser: plain_number
frontier:
  strategy: single_best
  primaryMetric: quality
ratchet:
  type: epsilon_improve
  metric: quality
  epsilon: 0
