schemaVersion: "0.1"
project:
  name: invalid-workspace
  artifact: code
  workspace: copy
proposer:
  type: command
  command: ./scripts/propose.sh
experiment:
  run:
    command: ./scripts/run.sh
metrics:
  catalog:
    - id: quality
      kind: numeric
      direction: maximize
      extractor:
        type: command
        command: ./scripts/metric.sh
        parser: plain_number
frontier:
  strategy: single_best
  primaryMetric: quality
ratchet:
  type: epsilon_improve
  metric: quality
  epsilon: 0
